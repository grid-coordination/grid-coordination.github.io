<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <style>
    :root {
      --bg: #fafafa;
      --fg: #222;
      --accent: #2a6e3f;
      --accent-light: #e8f5e9;
      --border: #ddd;
      --max-width: 52rem;
      --nav-bg: #1a1a2e;
      --nav-fg: #e0e0e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--fg); background: var(--bg); line-height: 1.7; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav { background: var(--nav-bg); padding: 1rem 2rem; }
    nav .nav-inner { max-width: var(--max-width); margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    nav .site-name { color: #fff; font-size: 1.2rem; font-weight: 600; letter-spacing: 0.02em; }
    nav .nav-links { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    nav .nav-links a { color: var(--nav-fg); font-size: 0.95rem; }
    nav .nav-links a:hover { color: #fff; text-decoration: none; }
    nav .nav-links a.active { color: #fff; border-bottom: 2px solid var(--accent); padding-bottom: 2px; }

    .container { max-width: var(--max-width); margin: 0 auto; padding: 2rem 2rem 4rem; }
    h1 { font-size: 2rem; margin-bottom: 1rem; color: var(--accent); }
    h2 { font-size: 1.5rem; margin: 2rem 0 0.75rem; color: #333; }
    h3 { font-size: 1.2rem; margin: 1.5rem 0 0.5rem; }
    p { margin-bottom: 1rem; }
    ul, ol { margin: 0 0 1rem 1.5rem; }
    li { margin-bottom: 0.3rem; }
    blockquote { border-left: 4px solid var(--accent); padding: 0.5rem 1rem; margin: 1rem 0; background: var(--accent-light); }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid var(--border); padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #f0f0f0; font-weight: 600; }
    code { background: #f0f0f0; padding: 0.15rem 0.35rem; border-radius: 3px; font-size: 0.9em; }
    pre { background: #f0f0f0; padding: 1rem; border-radius: 4px; overflow-x: auto; margin: 1rem 0; }
    pre code { background: none; padding: 0; }
    hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    .hero { background: var(--nav-bg); color: #fff; padding: 3rem 2rem; text-align: center; margin: -2rem -2rem 2rem; }
    .hero h1 { color: #fff; font-size: 2.4rem; margin-bottom: 0.5rem; }
    .hero p { color: #ccc; font-size: 1.15rem; max-width: 40rem; margin: 0 auto; }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(16rem, 1fr)); gap: 1.5rem; margin: 1.5rem 0; }
    .card { border: 1px solid var(--border); border-radius: 6px; padding: 1.25rem; background: #fff; }
    .card h3 { margin-top: 0; color: var(--accent); }

    footer { text-align: center; padding: 2rem; color: #888; font-size: 0.85rem; border-top: 1px solid var(--border); }

    @media (max-width: 600px) {
      .hero h1 { font-size: 1.6rem; }
      nav .nav-inner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="site-name">Grid Coordination</a>
      <div class="nav-links">
        <a href="/" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
        <a href="/vision" {% if page.url == '/vision' %}class="active"{% endif %}>Vision</a>
        <a href="/policy" {% if page.url == '/policy' %}class="active"{% endif %}>Policy</a>
        <a href="/software" {% if page.url == '/software' %}class="active"{% endif %}>Software</a>
      </div>
    </div>
  </nav>
  <div class="container">
    {{ content }}
  </div>
  <footer>
    &copy; 2026 Clark Communications Corporation. Licensed under MIT.
  </footer>
</body>
</html>
